<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>CrossLink — Bushing Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
/* Cast Parts Bushing Tracker — wireframe styles
   Vibe: warm paper, sketchy lines, one orange accent, monospace annotations */

@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --paper:   #fffef5;
  --paper-2: #faf8ec;
  --paper-3: #f3efde;
  --ink:     #1a1713;
  --ink-2:   #4a423a;
  --ink-3:   #8a7f72;
  --line:    #2a2420;
  --accent:  #d97757;
  --accent-2:#b9562f;
  --warn:    #c8923a;
  --ok:      #5d7a3a;

  --hand: 'Inter Tight', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  --title: 'Inter Tight', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--hand); }
body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(217,119,87,0.04), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(217,119,87,0.03), transparent 40%);
  min-height: 100vh;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px;
  border-bottom: 1.5px solid var(--line);
  background: var(--paper);
  position: sticky; top: 0; z-index: 50;
}
.topbar .brand { font-family: var(--title); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.topbar .brand span { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; margin-left: 8px; }
.topbar .crumbs { font-family: var(--mono); font-size: 12px; color: var(--ink-3); flex: 1; }
.topbar .crumbs a { color: var(--ink-2); text-decoration: none; border-bottom: 1px dotted var(--ink-3); cursor: pointer; }
.topbar .crumbs a:hover { color: var(--accent-2); }
.topbar .presence { display: flex; gap: 4px; align-items: center; }
.topbar .presence-label { font-family: var(--mono); font-size: 10px; color: var(--ink-3); margin-right: 6px; text-transform: uppercase; }

/* Nav tabs */
.navtabs { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1.5px solid var(--line); background: var(--paper); }
.navtab {
  font-family: var(--hand); font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
  padding: 10px 18px 8px; cursor: pointer;
  border: 1.5px solid transparent; border-bottom: none;
  margin-bottom: -1.5px;
  color: var(--ink-2);
  background: transparent;
  position: relative;
}
.navtab:hover { color: var(--ink); }
.navtab.active {
  background: var(--paper);
  border-color: var(--line);
  color: var(--ink);
  border-radius: 8px 10px 0 0;
}
.navtab.active::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1.5px; height: 3px; background: var(--paper);
}

/* Avatars */
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  border: 1.5px solid var(--line);
  background: var(--paper-2);
  color: var(--ink);
  flex-shrink: 0;
}
.avatar.sm { width: 22px; height: 22px; font-size: 9px; }
.avatar.lg { width: 40px; height: 40px; font-size: 13px; }
.avatar.viewing { box-shadow: 0 0 0 2px var(--paper), 0 0 0 3.5px var(--ok); }

.avatar.mike     { background: #f4d9c4; }
.avatar.fahim    { background: #c9e0e8; }
.avatar.ahmad    { background: #d2e3c1; }
.avatar.jianming { background: #dfd0e8; }

/* Sketchy card */
.sketch {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 6px 10px 6px 12px;
  padding: 16px;
  position: relative;
}
.sketch.paper-2 { background: var(--paper-2); }
.sketch.paper-3 { background: var(--paper-3); }
.sketch.dashed { border-style: dashed; }
.sketch.accent { border-color: var(--accent-2); }

.sketch h3 { font-family: var(--title); font-size: 18px; margin: 0 0 4px; font-weight: 700; letter-spacing: -0.01em; }
.sketch h4 { font-family: var(--hand); font-size: 12px; margin: 0 0 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-3); }
.sketch .sublabel { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; }

/* Priority + stage pills */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 2px 8px; border: 1.2px solid var(--line); border-radius: 10px;
  text-transform: uppercase; letter-spacing: .5px;
  background: var(--paper);
}
.pill.stage-new      { background: #fff; }
.pill.stage-eng      { background: #e4ebd6; }
.pill.stage-drawing  { background: #d7e5ec; }
.pill.stage-approved { background: #cfe5d0; }
.pill.stage-costing  { background: #e3d5ed; }
.pill.stage-pricing  { background: #f3d9c1; }
.pill.stage-quoted   { background: #f6e0ae; }
.pill.stage-po       { background: #1a1713; color: #fffef5; border-color: #1a1713; }

.pill.prio-high { background: var(--accent); color: #fff; border-color: var(--accent-2); }
.pill.prio-med  { background: var(--paper); color: var(--ink); }
.pill.prio-low  { background: var(--paper-3); color: var(--ink-3); }

.pill.overdue { background: var(--accent); color: white; border-color: var(--accent-2); }
.pill.tier-A { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.pill.tier-B { background: var(--paper-3); }
.pill.tier-C { background: var(--paper); color: var(--ink-3); }

/* Monospace tag */
.mono { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
.mono-sm { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }

/* Annotation arrow/note */
.note {
  font-family: var(--hand); font-size: 13px; color: var(--accent-2);
  font-style: italic;
}

/* Buttons */
button.btn {
  font-family: var(--hand); font-size: 13px; font-weight: 600;
  background: var(--paper); color: var(--ink);
  border: 1.5px solid var(--line); border-radius: 4px 10px 6px 12px;
  padding: 6px 14px; cursor: pointer;
  transition: transform .08s;
}
button.btn:hover { background: var(--paper-2); transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--line); }
button.btn.primary { background: var(--accent); color: white; border-color: var(--accent-2); }
button.btn.primary:hover { background: var(--accent-2); }
button.btn.sm { font-size: 12px; padding: 3px 10px; }

/* Scrollbar polish */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--ink-3); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* Layout */
.content { padding: 20px 24px 80px; max-width: 1600px; margin: 0 auto; }
.row { display: flex; gap: 16px; }
.col { display: flex; flex-direction: column; gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

/* Dashboard v1 — lanes by person */
.lane {
  background: var(--paper-2);
  border: 1.5px solid var(--line);
  border-radius: 8px 12px 8px 14px;
  padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 300px;
}
.lane-header { display: flex; align-items: center; gap: 10px; padding-bottom: 8px; border-bottom: 1.2px dashed var(--ink-3); }
.lane-header .name { font-family: var(--title); font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.lane-header .role { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; }
.lane-header .count { margin-left: auto; font-family: var(--mono); font-size: 11px; background: var(--paper); border: 1.2px solid var(--line); padding: 2px 8px; border-radius: 10px; }

.inquiry-card {
  background: var(--paper);
  border: 1.2px solid var(--line);
  border-radius: 4px 8px 4px 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: transform .08s;
  position: relative;
}
.inquiry-card:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--ink-3); }
.inquiry-card.overdue { border-color: var(--accent-2); border-left-width: 4px; }
.inquiry-card.stuck { background: repeating-linear-gradient(135deg, var(--paper) 0 6px, var(--paper-3) 6px 7px); }
.inquiry-card .top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.inquiry-card .account { font-family: var(--hand); font-weight: 600; font-size: 13px; }
.inquiry-card .part { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
.inquiry-card .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; font-family: var(--mono); color: var(--ink-3); }
.inquiry-card .newdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); position: absolute; top: 8px; right: 8px; }

/* Activity feed */
.activity-item {
  display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--ink-3);
}
.activity-item:last-child { border-bottom: none; }
.activity-item .body { flex: 1; }
.activity-item .meta { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
.activity-item .text { font-family: var(--hand); font-size: 13px; margin-top: 2px; line-height: 1.5; }

/* Dashboard v2 — list view */
.tbl { width: 100%; border-collapse: collapse; font-family: var(--hand); font-size: 13px; }
.tbl th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-3); text-align: left; padding: 10px 10px; border-bottom: 1.5px solid var(--line); font-weight: 500; }
.tbl td { padding: 10px 10px; border-bottom: 1px dashed var(--ink-3); vertical-align: middle; }
.tbl tbody tr:hover { background: var(--paper-2); cursor: pointer; }
.tbl tbody tr.overdue-row td:first-child { border-left: 3px solid var(--accent-2); }

/* Dashboard v3 — kanban */
.kanban { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
.kanban-col {
  min-width: 220px; flex: 1;
  background: var(--paper-2);
  border: 1.2px solid var(--line);
  border-radius: 6px 10px;
  padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.kanban-col .col-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; padding-bottom: 6px; border-bottom: 1px dashed var(--ink-3); }
.kanban-col .col-head .lbl { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.kanban-col .col-head .ct { font-family: var(--mono); font-size: 11px; background: var(--paper); border: 1px solid var(--line); padding: 1px 6px; border-radius: 8px; }

/* Accounts list */
.account-card {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 6px 12px 6px 14px;
  padding: 16px;
  cursor: pointer;
  transition: transform .08s;
  display: flex; flex-direction: column; gap: 10px;
}
.account-card:hover { transform: translate(-2px,-2px); box-shadow: 3px 3px 0 var(--ink-3); }
.account-card { position: relative; }
.account-card .head { display: flex; align-items: flex-start; gap: 8px; padding-right: 70px; min-height: 32px; }
.account-card .name { font-family: var(--title); font-size: 18px; font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }
.account-card .head .pill { position: absolute; top: 14px; right: 14px; }
.account-card .loc { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
.account-card .stats { display: flex; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
.account-card .stats b { color: var(--ink); font-size: 14px; font-family: var(--hand); font-weight: 600; }
.account-card .stage-bar { display: flex; gap: 3px; }
.account-card .stage-bar .seg { height: 6px; flex: 1; background: var(--paper-3); border-radius: 2px; }
.account-card .stage-bar .seg.filled { background: var(--ink); }
.account-card .stage-bar .seg.accent { background: var(--accent); }

/* Account detail */
.project-block {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 6px 12px 6px 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.project-block .phead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1.2px dashed var(--ink-3); }
.project-block .pname { font-family: var(--title); font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.project-block .pmeta { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

/* Inquiry detail */
.inquiry-detail { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.stage-track {
  display: flex; align-items: center; gap: 4px;
  padding: 16px; background: var(--paper-2);
  border: 1.5px solid var(--line); border-radius: 8px;
  overflow-x: auto;
}
.stage-track .step {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex: 1; min-width: 80px;
  position: relative;
}
.stage-track .dot {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--line); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
}
.stage-track .step.done .dot { background: var(--ink); color: var(--paper); }
.stage-track .step.current .dot { background: var(--accent); color: white; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(217,119,87,0.2); }
.stage-track .step .lbl { font-family: var(--mono); font-size: 9px; text-align: center; color: var(--ink-3); text-transform: uppercase; letter-spacing: .5px; max-width: 80px; }
.stage-track .step.current .lbl { color: var(--ink); font-weight: 700; }
.stage-track .connector { flex: 0 0 auto; width: 20px; height: 1.5px; background: var(--line); margin-top: -16px; }
.stage-track .connector.done { background: var(--ink); height: 2px; }

.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
.field .k { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-3); letter-spacing: 1px; }
.field .v { font-family: var(--hand); font-size: 14px; font-weight: 600; margin-top: 2px; }
.field .v.mono { font-family: var(--mono); font-size: 13px; font-weight: 500; }

.thread-item { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px dashed var(--ink-3); }
.thread-item .body { flex: 1; }
.thread-item .hdr { display: flex; gap: 8px; align-items: baseline; }
.thread-item .who { font-family: var(--hand); font-weight: 600; font-size: 13px; }
.thread-item .when { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
.thread-item .txt { font-family: var(--hand); font-size: 14px; margin-top: 2px; line-height: 1.5; }

.composer { display: flex; gap: 8px; margin-top: 12px; }
.composer textarea {
  flex: 1; font-family: var(--hand); font-size: 13px;
  border: 1.5px solid var(--line); border-radius: 4px 8px 4px 10px;
  padding: 8px 10px; background: var(--paper);
  resize: vertical; min-height: 40px;
}

/* Tweaks panel */
.tweaks-panel {
  position: fixed; bottom: 16px; right: 16px;
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 6px 14px 6px 14px;
  padding: 14px 16px;
  box-shadow: 4px 4px 0 var(--ink-3);
  z-index: 100;
  width: 260px;
  display: none;
}
.tweaks-panel.open { display: block; }
.tweaks-panel h4 { font-family: var(--title); font-size: 15px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; text-transform: none; color: var(--ink); }
.tweaks-panel label { display: block; font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-3); margin: 10px 0 4px; letter-spacing: 1px; }
.tweaks-panel .seg { display: flex; gap: 0; border: 1.5px solid var(--line); border-radius: 4px; overflow: hidden; }
.tweaks-panel .seg button { flex: 1; background: var(--paper); border: none; padding: 6px 4px; font-family: var(--hand); font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink-2); }
.tweaks-panel .seg button.active { background: var(--ink); color: var(--paper); }
.tweaks-panel .seg button + button { border-left: 1px solid var(--line); }

/* Helpful misc */
.empty { padding: 20px; text-align: center; color: var(--ink-3); font-family: var(--hand); font-size: 13px; }
.hr-dashed { border: none; border-top: 1.2px dashed var(--ink-3); margin: 14px 0; }

/* Dense mode */
body.dense .inquiry-card { padding: 7px 10px; }
body.dense .sketch { padding: 12px; }
body.dense .project-block { padding: 12px; }
body.dense .account-card { padding: 12px; }

/* Presence hidden */
body.hide-presence .avatar.viewing { box-shadow: none; }
body.hide-presence .topbar .presence { display: none; }

/* Mini-legend strip used at top of dashboard */
.legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; }
.legend .item { display: inline-flex; gap: 4px; align-items: center; }

/* Dashboard KPI cards */
.kpi { background: var(--paper); border: 1.5px solid var(--line); border-radius: 6px 10px 6px 10px; padding: 14px; }
.kpi .big { font-family: var(--title); font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.kpi .lbl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-3); letter-spacing: 1px; margin-top: 6px; }
.kpi.accent { background: var(--accent); color: white; border-color: var(--accent-2); }
.kpi.accent .lbl { color: rgba(255,255,255,0.85); }

/* Scribbled underline for links */
a.scribble { color: var(--accent-2); text-decoration: none; border-bottom: 1.5px solid var(--accent-2); cursor: pointer; }
a.scribble:hover { background: rgba(217,119,87,0.1); }


@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.pin-dots{display:flex;gap:14px;justify-content:center}.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);background:transparent;transition:background .12s}.pin-dot.filled{background:var(--ink)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:220px}
.pin-key{height:56px;font-family:var(--title);font-size:22px;font-weight:600;border:1.5px solid var(--line);border-radius:4px 8px 4px 8px;background:var(--paper);color:var(--ink);cursor:pointer;transition:transform .08s,background .08s}
.pin-key:hover{background:var(--paper-2);transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink-3)}.pin-key.del{font-size:18px}.pin-key.empty{border-color:transparent;background:transparent;cursor:default;pointer-events:none}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}
.profile-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.profile-card{background:var(--paper);border:1.5px solid var(--line);border-radius:6px 14px 6px 14px;padding:22px 28px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .08s;min-width:110px}
.profile-card:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink-3)}
.loader{display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--mono);font-size:13px;color:var(--ink-3)}
.form-input,.form-select,.form-textarea{width:100%;font-family:var(--hand);font-size:13px;border:1.5px solid var(--line);border-radius:4px 8px 4px 8px;padding:8px 10px;background:var(--paper);color:var(--ink);box-sizing:border-box}
.form-textarea{resize:vertical;min-height:60px}

            ] }
        ]

];

// Pre-compute useful aggregates
window.DATA_UTILS = {
  allInquiries() {
    const out = [];
    for (const a of window.ACCOUNTS) {
      for (const p of a.projects) {
        if (p.archived) continue;
        for (const i of p.inquiries) {
          if (i.archived) continue;
          out.push({ ...i, accountId: a.id, accountName: a.name, projectId: p.id, projectName: p.name, tier: a.tier });
        }
      }
    }

  },
  stageById(id) { return window.STAGES.find(s=>s.id===id)||window.INFO_STAGES.find(s=>s.id===id)||window.PROJECT_STAGES.find(s=>s.id===id)||null; },
  teamById(id) { return window.TEAM.find(t => t.id === id); },
  daysSince(dateStr) {
    const today = new Date(2026, 3, 17);
    const then = new Date(dateStr);

};

window.ACCOUNTS_SEED = JSON.parse(JSON.stringify(window.ACCOUNTS));

  <script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
function cls(...a){return a.filter(Boolean).join(' ')}
function daysSince(d){return window.DATA_UTILS.daysSince(d)}
function stage(id){return window.DATA_UTILS.stageById(id)}
function person(id){return window.DATA_UTILS.teamById(id)}
function dueLabel(due){const ds=daysSince(due);if(ds>0)return`${ds}d overdue`;if(ds===0)return'due today';return`due in ${-ds}d`}
function isComplete(inq){const t=inq.type||'rfq';return t==='rfq'?inq.stage==='po':t==='info'?inq.status==='resolved':['closed-won','closed-lost'].includes(inq.projectStage)}
function isOverdue(inq){return!!inq.due&&daysSince(inq.due)>0&&!isComplete(inq)}
function isStuck(inq){return daysSince(inq.updated)>5&&!isComplete(inq)}
function owedBy(inq){if(inq.waitingOn==='client')return null;if(inq.waitingOn)return inq.waitingOn;if(inq.assignedTo)return inq.assignedTo;const s=stage(inq.stage);return s?s.owner.toLowerCase():null}
function Avatar({personId,size='md',viewing=false,title}){const p=person(personId);if(!p)return null;return<div className={cls('avatar',size==='sm'&&'sm',size==='lg'&&'lg',p.id,viewing&&'viewing')} title={title||`${p.name} — ${p.role}${viewing?' (online)':''}`}>{p.initials}</div>}

    <div className="bottom">
      {type==='info'

      {inq.due&&<span className={overdue?'note':''} style={overdue?{color:'#b9562f'}:{}}>{dueLabel(inq.due)}</span>}
    </div>
  </div>);
}
function StageTrack({currentStageId,stages}){
  const arr=stages||window.STAGES;
  const curIdx=arr.findIndex(s=>s.id===currentStageId);
  return(<div className="stage-track">{arr.map((s,i)=>{const done=i<curIdx,current=i===curIdx;return(<React.Fragment key={s.id}><div className={cls('step',done&&'done',current&&'current')}><div className="dot">{i+1}</div><div className="lbl">{s.label}</div></div>{i<arr.length-1&&<div className={cls('connector',done&&'done')}/>}</React.Fragment>);})}</div>);
}
function ActivityThread({activity}){

}
function Modal({title,onClose,children,width=520}){
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[]);
  return(<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="modal-box" style={{maxWidth:width}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><h3 style={{margin:0,fontSize:18}}>{title}</h3><button className="btn sm" onClick={onClose}>✕</button></div>{children}</div></div>);

function TopBar({crumbs,currentUser,onlineUsers,onLogout,alertCount,chatUnread,onAlertsToggle,onChatToggle}){

    <div className="presence"><span className="presence-label">online</span>{window.TEAM.map(t=><Avatar key={t.id} personId={t.id} size="sm" viewing={!!(onlineUsers&&onlineUsers[t.id])}/>)}</div>

  </div>);
}
function NavTabs({current,onChange}){

  <script type="text/babel">
const { useState: useStateD, useMemo: useMemoD } = React;
const { Avatar: AvD, StagePill: SPD, PriorityPill: PPD, InquiryCard: ICD,

function parsePrice(str){
  if(!str||str==='—')return 0;
  const m=String(str).match(/[\d,]+\.?\d*/);
  return m?parseFloat(m[0].replace(/,/g,'')):0;
}
function inquiryRevenue(inq){
  const p=parsePrice(inq.price);
  return p*(parseInt(inq.qty)||0);
}
function fmtMoney(n){
  if(!n)return'$0';
  if(n>=1000000)return`$${(n/1000000).toFixed(1)}M`;
  if(n>=1000)return`$${(n/1000).toFixed(0)}K`;
  return`$${Math.round(n).toLocaleString()}`;
}

function KPI({big,lbl,accent}){
  return(
    <div className={clsD('kpi',accent&&'accent')}>
      <div className="big">{big}</div><div className="lbl">{lbl}</div>
    </div>
  );
}

function RevenuePipeline({onOpenInquiry}){
  const all=useMemoD(()=>window.DATA_UTILS.allInquiries(),[]);
  const active=all.filter(i=>!icD(i));
  const withRev=active.map(i=>({...i,rev:inquiryRevenue(i)})).filter(i=>i.rev>0).sort((a,b)=>b.rev-a.rev);
  const totalPipeline=withRev.reduce((s,i)=>s+i.rev,0);
  const totalQuoted=withRev.filter(i=>i.stage==='quoted').reduce((s,i)=>s+i.rev,0);
  const largest=withRev[0]?.rev||0;
  return(
    <div className="sketch">
      <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:12}}>
        <h3 style={{margin:0}}>Revenue pipeline</h3>

      </div>
      <div className="grid-4" style={{marginBottom:16}}>
        <KPI big={fmtMoney(totalPipeline)} lbl="total pipeline"/>
        <KPI big={fmtMoney(totalQuoted)} lbl="at quote stage" accent={totalQuoted>0}/>
        <KPI big={fmtMoney(largest)} lbl="largest opportunity"/>
        <KPI big={withRev.length} lbl="priced inquiries"/>
      </div>
      {withRev.length===0?(
        <div className="empty">No priced inquiries yet — pipeline value appears once a price is entered on an inquiry.</div>
      ):(
        <table className="tbl">
          <thead>
            <tr><th>inquiry</th><th>account / rfq</th><th>stage</th><th>qty</th><th>unit price</th><th style={{textAlign:'right'}}>potential</th></tr>

                <td style={{fontWeight:700,fontFamily:'var(--mono)',fontSize:13,textAlign:'right',color:inq.stage==='quoted'?'var(--ok)':'var(--ink)'}}>{fmtMoney(inq.rev)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function DashboardLanes({onOpenInquiry}){
  const all=useMemoD(()=>window.DATA_UTILS.allInquiries(),[]);
  const byPerson=useMemoD(()=>{
    const map={};
    for(const t of window.TEAM)map[t.id]=[];
    for(const inq of all){
      if(icD(inq))continue;
      const owed=owD(inq);
      if(owed&&map[owed])map[owed].push(inq);
    }
    for(const k of Object.keys(map))map[k].sort((a,b)=>{const ao=odD(a)?0:1,bo=odD(b)?0:1;if(ao!==bo)return ao-bo;return dsD(a.due)>dsD(b.due)?-1:1});
    return map;
  },[all]);
  const waitingOnClient=all.filter(i=>i.waitingOn==='client');
  const recentActivity=useMemoD(()=>{
    const items=[];
    for(const inq of all)for(const a of inq.activity||[])items.push({...a,inq});
    items.sort((a,b)=>a.at<b.at?1:-1);return items.slice(0,8);
  },[all]);
  return(
    <div className="col">
      <div className="grid-4">
        <KPI big={all.filter(i=>odD(i)).length} lbl="overdue" accent/>
        <KPI big={all.filter(i=>i.stage==='new').length} lbl="new · needs triage"/>

            <span className="item" style={{color:'#b9562f'}}>■ red edge = overdue</span>
            <span className="item">░ hatched = stuck</span>
          </div>
        </div>
        <div className="grid-4">
          {window.TEAM.map(p=>(
            <div key={p.id} className="lane">
              <div className="lane-header">
                <AvD personId={p.id} size="lg"/>
                <div><div className="name">{p.name}</div><div className="role">{p.role}</div></div>
                <div className="count">{byPerson[p.id].length}</div>
              </div>
              {byPerson[p.id].length===0?<div className="empty">all clear ✓</div>
                :byPerson[p.id].map(inq=><ICD key={inq.id} inq={inq} onClick={()=>onOpenInquiry(inq)}/>)}
            </div>
          ))}
        </div>
      </div>
      <div className="grid-2">
        <div className="sketch">
          <h3>Waiting on customer</h3>
          <div className="mono-sm" style={{marginBottom:10}}>Nothing for us to action — but follow up if stale.</div>
          {waitingOnClient.length===0?<div className="empty">none</div>
            :<div className="col" style={{gap:8}}>{waitingOnClient.map(inq=><ICD key={inq.id} inq={inq} onClick={()=>onOpenInquiry(inq)}/>)}</div>}
        </div>
        <div className="sketch">
          <h3>Recent activity</h3>
          <div className="mono-sm" style={{marginBottom:6}}>Last 8 updates across all inquiries</div>
          {recentActivity.map((a,i)=>(
            <div key={i} className="activity-item">
              <AvD personId={a.by} size="sm"/>
              <div className="body">
                <div className="meta">{persD(a.by)?.name||a.by} · {a.at} · <a className="scribble" onClick={()=>onOpenInquiry(a.inq)}>{a.inq.accountName} / {a.inq.id}</a></div>
                <div className="text">{a.text}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <RevenuePipeline onOpenInquiry={onOpenInquiry}/>
    </div>
  );
}

function DashboardList({onOpenInquiry}){
  const all=useMemoD(()=>window.DATA_UTILS.allInquiries(),[]);
  const [filter,setFilter]=useStateD('all');
  const active=all.filter(i=>!icD(i));
  const scored=useMemoD(()=>{
    const ws=active.map(inq=>{let s=0;if(odD(inq))s+=100+dsD(inq.due);if(inq.priority==='high')s+=40;if(inq.priority==='med')s+=15;if(stkD(inq))s+=20;if(inq.stage==='new')s+=10;return{...inq,score:s}});
    ws.sort((a,b)=>b.score-a.score);return ws;
  },[active]);
  const filtered=useMemoD(()=>{
    if(filter==='all')return scored;
    if(filter==='client')return scored.filter(i=>i.waitingOn==='client');
    return scored.filter(i=>owD(i)===filter);
  },[scored,filter]);
  return(
    <div className="col">
      <div className="grid-4">
        <KPI big={all.filter(i=>odD(i)).length} lbl="overdue" accent/>
        <KPI big={all.filter(i=>i.stage==='new').length} lbl="new · needs triage"/>

                  <td><SPD stageId={inq.stage}/></td>
                  <td><PPD priority={inq.priority}/></td>
                  <td>{owed?<div style={{display:'flex',alignItems:'center',gap:6}}><AvD personId={owed} size="sm"/><span>{persD(owed)?.name}</span></div>:(inq.waitingOn==='client'?<span className="mono-sm">customer</span>:'—')}</td>
                  <td className={odD(inq)?'note':''}>{window.Wire.dueLabel(inq.due)}</td>
                  <td className="mono-sm">{inq.updated} · {persD(inq.updatedBy)?.name}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <RevenuePipeline onOpenInquiry={onOpenInquiry}/>
    </div>
  );
}

function FilterBtn({active,onClick,children}){
  return(
    <button className={clsD('btn','sm')} style={active?{background:'#1a1713',color:'#fffef5'}:{}} onClick={onClick}>
      <span style={{display:'inline-flex',gap:4,alignItems:'center'}}>{children}</span>

function DashboardKanban({onOpenInquiry}){

  return(

            <div key={s.id} className="kanban-col">
              <div className="col-head"><div className="lbl">{s.label}</div><div className="ct">{byStage[s.id].length}</div></div>

  <script type="text/babel">
const { useState: useStateA, useMemo: useMemoA, useEffect: useEffectA, useRef: useRefA } = React;
const { Avatar: Av2, StagePill: SP2, PriorityPill: PP2, TierPill: TP2,
        InquiryCard: IC2, StageTrack: ST2, ActivityThread: AT2, Modal,

// ── shared form helpers ────────────────────────────────────────────────────────
function FRow({label,children}){

}
function EditableField({k,v,onSave,mono,multiline,readOnly,placeholder}){
  const [editing,setEditing]=useStateA(false);
  const [val,setVal]=useStateA(v||'');
  useEffectA(()=>{if(!editing)setVal(v||'');},[v,editing]);
  function save(){setEditing(false);const trimmed=val.trim();if(trimmed!==(v||'').trim())onSave(trimmed);}
  function cancel(){setEditing(false);setVal(v||'');}
  if(readOnly)return<div className="field"><div className="k">{k}</div><div className={cls2('v',mono&&'mono')}>{v||'—'}</div></div>;
  if(editing){
    const inputStyle={fontSize:13,fontFamily:mono?'var(--mono)':'var(--hand)',width:'100%',border:'1.5px solid var(--accent-2)',borderRadius:4,padding:'4px 6px',background:'var(--paper)',color:'var(--ink)',boxSizing:'border-box'};
    return(
      <div className="field">
        <div className="k">{k}</div>
        {multiline
          ?<textarea style={{...inputStyle,minHeight:64,resize:'vertical'}} value={val} onChange={e=>setVal(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Escape')cancel();}} autoFocus/>
          :<input style={inputStyle} value={val} onChange={e=>setVal(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape')cancel();}} autoFocus/>
        }
      </div>
    );
  }
  return(
    <div className="field" onClick={()=>setEditing(true)} style={{cursor:'text'}} title="Click to edit">
      <div className="k">{k} <span style={{fontSize:9,opacity:.5}}>✎</span></div>
      <div className={cls2('v',mono&&'mono')} style={{borderBottom:'1px dashed var(--ink-3)',minHeight:18}}>
        {v||<span style={{color:'var(--ink-3)',fontStyle:'italic',fontSize:12}}>{placeholder||'click to add…'}</span>}
      </div>
    </div>
  );
}

// ── Add Inquiry Modal ──────────────────────────────────────────────────────────
const INQ_TYPES=[
  {id:'rfq',    icon:'📋', name:'Request for Quote',          desc:'Customer requests a part — goes through engineering, drawing, costing, and quoting.'},
  {id:'info',   icon:'💬', name:'Information Inquiry',        desc:'Generic question or action item from a customer. Assign, action, and close.'},
  {id:'project',icon:'🏆', name:'Key Project / Opportunity',  desc:'Strategic multi-phase opportunity — track volume, revenue potential, meetings, and project stage.'},
];
function AddInquiryModal({accountName,projectName,onClose,onAdd}){
  const in30=new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  const [type,setType]=useStateA(null);
  // RFQ form state
  const [rfq,setRfq]=useStateA({rfqName:'',priority:'med',due:in30,specs:''});
  const [rfqParts,setRfqParts]=useStateA([]);
  const setR=k=>e=>setRfq(f=>({...f,[k]:e.target.value}));
  // Info form state
  const [info,setInfo]=useStateA({subject:'',assignedTo:'fahim',priority:'med',due:''});
  const setI=k=>e=>setInfo(f=>({...f,[k]:e.target.value}));
  // Project form state
  const [proj,setProj]=useStateA({projectTitle:'',potentialVolume:'',potentialRevenue:'',priority:'med',notes:''});
  const setP=k=>e=>setProj(f=>({...f,[k]:e.target.value}));

  function submitRfq(e){e.preventDefault();if(!rfq.rfqName.trim())return;onAdd({type:'rfq',rfqName:rfq.rfqName,parts:rfqParts,priority:rfq.priority,due:rfq.due,specs:rfq.specs});onClose();}
  function submitInfo(e){e.preventDefault();if(!info.subject.trim())return;onAdd({type:'info',status:'open',...info});onClose();}
  function submitProj(e){e.preventDefault();if(!proj.projectTitle.trim())return;onAdd({type:'project',projectStage:'discovery',...proj});onClose();}

  if(!type) return(
    <Modal title={`New Inquiry — ${projectName}`} onClose={onClose} width={640}>
      <div className="mono-sm" style={{marginBottom:14,color:'var(--ink-3)'}}>Choose the type of inquiry to create:</div>
      <div className="type-pick-grid">
        {INQ_TYPES.map(t=>(
          <div key={t.id} className="type-pick-card" onClick={()=>setType(t.id)}>
            <div className="tpc-icon">{t.icon}</div>
            <div className="tpc-name">{t.name}</div>
            <div className="tpc-desc">{t.desc}</div>
          </div>
        ))}
      </div>
      <div className="form-actions" style={{borderTop:'none',marginTop:8}}>
        <button className="btn" onClick={onClose}>cancel</button>
      </div>
    </Modal>
  );

  if(type==='rfq') return(
    <Modal title={`New RFQ — ${projectName||accountName}`} onClose={onClose} width={560}>
      <form onSubmit={submitRfq}>
        <FRow label="RFQ name / description *"><input className="form-input" value={rfq.rfqName} onChange={setR('rfqName')} placeholder="e.g. 138 kV HV Bushing Request, Silicone Bushing Program…" required autoFocus/></FRow>
        <div className="form-grid-2">
          <FRow label="Priority"><select className="form-select" value={rfq.priority} onChange={setR('priority')}><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></FRow>
          <FRow label="Due date"><input className="form-input" type="date" value={rfq.due} onChange={setR('due')}/></FRow>
        </div>
        <FRow label="Specs / notes"><textarea className="form-textarea" value={rfq.specs} onChange={setR('specs')} placeholder="Voltage class, standards, special requirements…"/></FRow>
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
            <label className="form-label" style={{margin:0}}>PART NUMBERS</label>
            <button type="button" className="btn sm" onClick={()=>setRfqParts(p=>[...p,{partNum:'',qty:''}])}>+ add part</button>
          </div>
          {rfqParts.length===0&&<div className="mono-sm" style={{color:'var(--ink-3)',paddingBottom:2}}>No parts yet — engineering will confirm part numbers later.</div>}
          {rfqParts.map((pt,i)=>(
            <div key={i} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
              <input className="form-input" value={pt.partNum} onChange={e=>setRfqParts(p=>p.map((r,j)=>j===i?{...r,partNum:e.target.value}:r))} placeholder="Part #" style={{flex:2}}/>
              <input className="form-input" value={pt.qty} onChange={e=>setRfqParts(p=>p.map((r,j)=>j===i?{...r,qty:e.target.value}:r))} placeholder="Qty or N/A" style={{flex:1}}/>
              <button type="button" className="btn sm" style={{color:'#b9562f',borderColor:'#b9562f',flexShrink:0}} onClick={()=>setRfqParts(p=>p.filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
        </div>
        <div className="form-actions"><button type="button" className="btn" onClick={()=>setType(null)}>← back</button><button type="submit" className="btn primary">create RFQ</button></div>
      </form>
    </Modal>
  );

  if(type==='info') return(
    <Modal title={`New Info Inquiry — ${projectName}`} onClose={onClose}>
      <form onSubmit={submitInfo}>
        <FRow label="Subject / question *"><textarea className="form-textarea" value={info.subject} onChange={setI('subject')} placeholder="What did the customer ask or request?" required autoFocus style={{minHeight:80}}/></FRow>
        <div className="form-grid-2">
          <FRow label="Assign to"><select className="form-select" value={info.assignedTo} onChange={setI('assignedTo')}>{window.TEAM.map(t=><option key={t.id} value={t.id}>{t.name} — {t.role}</option>)}</select></FRow>
          <FRow label="Priority"><select className="form-select" value={info.priority} onChange={setI('priority')}><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></FRow>
        </div>
        <FRow label="Due / target response date (optional)"><input className="form-input" type="date" value={info.due} onChange={setI('due')}/></FRow>
        <div className="form-actions"><button type="button" className="btn" onClick={()=>setType(null)}>← back</button><button type="submit" className="btn primary">create inquiry</button></div>
      </form>
    </Modal>
  );

  if(type==='project') return(
    <Modal title={`New Key Project — ${projectName||accountName}`} onClose={onClose}>
      <form onSubmit={submitProj}>
        <FRow label="Project title *"><input className="form-input" value={proj.projectTitle} onChange={setP('projectTitle')} placeholder="e.g. 345 kV Qualification Program" required autoFocus/></FRow>
        <div className="form-grid-2">
          <FRow label="Potential volume"><input className="form-input" value={proj.potentialVolume} onChange={setP('potentialVolume')} placeholder="e.g. 200 units/yr"/></FRow>
          <FRow label="Potential revenue"><input className="form-input" value={proj.potentialRevenue} onChange={setP('potentialRevenue')} placeholder="e.g. $500K"/></FRow>
        </div>
        <FRow label="Priority"><select className="form-select" value={proj.priority} onChange={setP('priority')}><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></FRow>
        <FRow label="Notes / context"><textarea className="form-textarea" value={proj.notes} onChange={setP('notes')} placeholder="Key contacts, background, what's driving this project…" style={{minHeight:70}}/></FRow>
        <div className="form-actions"><button type="button" className="btn" onClick={()=>setType(null)}>← back</button><button type="submit" className="btn primary">create project inquiry</button></div>
      </form>
    </Modal>
  );

  return null;
}

function AccountCard({acc,onOpenAccount}){
  const allInq=acc.projects.filter(p=>!p.archived).flatMap(p=>p.inquiries.filter(i=>!i.archived));
  const active=allInq.filter(i=>!ic2(i));
  const overdue=allInq.filter(i=>od2(i)).length;
  const newCt=allInq.filter(i=>i.stage==='new').length;
  const stageCounts={};
  for(const i of active)stageCounts[i.stage]=(stageCounts[i.stage]||0)+1;
  return(
    <div className="account-card" onClick={()=>onOpenAccount(acc.id)}>
      <div className="head"><div className="name">{acc.name}</div><TP2 tier={acc.tier}/></div>
      <div className="loc">
        {acc.location}
        {acc.type==='prospect'&&<span className="pill" style={{background:'#fffef5',borderColor:'#b9562f',color:'#b9562f',fontSize:9,marginLeft:8}}>PROSPECT</span>}
      </div>
      <div className="stats">
        <div><b>{acc.projects.filter(p=>!p.archived).length}</b> projects</div>
        <div><b>{allInq.length}</b> inquiries</div>
        {overdue>0&&<div style={{color:'#b9562f'}}><b>{overdue}</b> overdue</div>}
        {newCt>0&&<div><b>{newCt}</b> new</div>}
      </div>
      <div>
        <div className="mono-sm" style={{marginBottom:4}}>active pipeline</div>
        <div className="stage-bar">
          {window.STAGES.filter(s=>s.id!=='po').map(s=>{
            const c=stageCounts[s.id]||0;
            return<div key={s.id} className={cls2('seg',c>0&&'filled',c>0&&overdue>0&&'accent')} title={`${s.label}: ${c}`}/>;
          })}
        </div>
      </div>
    </div>
  );
}

// ── InquiryDetail ─────────────────────────────────────────────────────────────
function InquiryDetail({inquiry,onOpenAccount,onDeleteInquiry,onArchiveInquiry,onPostActivity,onUpdateInquiry}){
  const inq=inquiry;
  const type=inq.type||'rfq';
  const [draft,setDraft]=useStateA('');
  function postUpdate(){
    if(!draft.trim())return;
    const today=new Date().toISOString().slice(0,10);
    onPostActivity(inq.id,{by:window.CURRENT_USER?.id||'fahim',at:today,text:draft.trim()});
    setDraft('');
  }
  const ActionSidebar=(
    <div className="col">
      <div className="sketch paper-2">
        <h4>Quick actions</h4>
        <div className="col" style={{gap:8}}>
          {!inq.archived?(
            <>
              <button className="btn primary" style={{background:'#5d7a3a',borderColor:'#3d5a1a'}}
                onClick={()=>{if(window.confirm('Archive this inquiry?\nHidden from active pipeline but kept for reference.'))onArchiveInquiry(inq.id);}}>
                ✓ archive as complete
              </button>
              <button className="btn" style={{color:'#b9562f',borderColor:'#b9562f'}}
                onClick={()=>{if(window.confirm(`Permanently delete inquiry #${inq.id}?\nCannot be undone.`))onDeleteInquiry(inq.id);}}>
                ✕ delete inquiry
              </button>
            </>
          ):(
            <>
              <div className="mono-sm" style={{padding:'8px 0',color:'#8a7f72'}}>This inquiry is archived.</div>
              <button className="btn" style={{color:'#b9562f',borderColor:'#b9562f'}}
                onClick={()=>{if(window.confirm(`Permanently delete archived inquiry #${inq.id}?`))onDeleteInquiry(inq.id);}}>
                ✕ delete permanently
              </button>
            </>
          )}
        </div>
      </div>
      <div className="sketch"><h4>Related on this account</h4><RelatedInquiries accountId={inq.accountId} currentId={inq.id}/></div>
    </div>
  );
  const ActivityPanel=(
    <div className="sketch">
      <h4>Updates & discussion</h4>
      <div className="composer">
        <Av2 personId={window.CURRENT_USER?.id||'fahim'} size="sm"/>
        <MentionTextarea value={draft} onChange={setDraft} onSubmit={postUpdate} placeholder="post an update… @ to mention someone"/>
        <button className="btn primary" onClick={postUpdate}>post</button>
      </div>
      <div style={{marginTop:12}}><AT2 activity={inq.activity||[]}/></div>
    </div>
  );

  if(type==='rfq') return <RFQDetail inq={inq} onOpenAccount={onOpenAccount} onUpdateInquiry={onUpdateInquiry} ActionSidebar={ActionSidebar} ActivityPanel={ActivityPanel}/>;
  if(type==='info') return <InfoDetail inq={inq} onOpenAccount={onOpenAccount} onUpdateInquiry={onUpdateInquiry} ActionSidebar={ActionSidebar} ActivityPanel={ActivityPanel}/>;
  if(type==='project') return <ProjectDetail inq={inq} onOpenAccount={onOpenAccount} onUpdateInquiry={onUpdateInquiry} ActionSidebar={ActionSidebar} ActivityPanel={ActivityPanel}/>;
  return null;
}

// Inline-editable title (used in h3 headers)
function InlineEditTitle({value,onSave,readOnly}){
  const [editing,setEditing]=useStateA(false);
  const [val,setVal]=useStateA(value||'');
  useEffectA(()=>{if(!editing)setVal(value||'');},[value,editing]);
  function save(){setEditing(false);const t=val.trim();if(t&&t!==value)onSave(t);}
  if(readOnly||!editing)return<span style={readOnly?{}:{cursor:'text',borderBottom:'1px dashed var(--ink-3)'}} onClick={()=>!readOnly&&setEditing(true)} title={readOnly?'':'Click to rename'}>{value}</span>;
  return<input value={val} onChange={e=>setVal(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setEditing(false);setVal(value||'');}}} autoFocus style={{fontSize:'inherit',fontWeight:'inherit',fontFamily:'inherit',border:'none',borderBottom:'2px solid var(--accent)',background:'transparent',color:'inherit',outline:'none',minWidth:200}}/>;
}

// ── RFQ Parts Panel ──────────────────────────────────────────────────────────
function RFQPartsPanel({inq,onUpdateInquiry}){
  const [showAdd,setShowAdd]=useStateA(false);
  const [newPart,setNewPart]=useStateA({partNum:'',qty:''});
  const parts=inq.parts||[];
  const legacy=!parts.length&&(inq.part||inq.qty);
  function addPart(e){
    e.preventDefault();
    onUpdateInquiry(inq.id,{parts:[...parts,{partNum:newPart.partNum.trim(),qty:newPart.qty.trim()||'N/A'}]});
    setNewPart({partNum:'',qty:''});setShowAdd(false);
  }
  function removePart(i){onUpdateInquiry(inq.id,{parts:parts.filter((_,j)=>j!==i)});}
  return(
    <div className="sketch">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <h4 style={{margin:0}}>Part Numbers</h4>
        {!inq.archived&&<button className="btn sm primary" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'cancel':'+ add part'}</button>}
      </div>
      {showAdd&&(
        <form onSubmit={addPart} style={{display:'flex',gap:8,marginBottom:12,padding:'10px 12px',background:'var(--paper-2)',border:'1.2px dashed #c0b8a8',borderRadius:6,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{flex:2,minWidth:140}}>
            <label className="form-label">PART #</label>
            <input className="form-input" value={newPart.partNum} onChange={e=>setNewPart(p=>({...p,partNum:e.target.value}))} placeholder="e.g. HV-BSH-138-A" autoFocus/>
          </div>
          <div style={{flex:1,minWidth:100}}>
            <label className="form-label">QTY</label>
            <input className="form-input" value={newPart.qty} onChange={e=>setNewPart(p=>({...p,qty:e.target.value}))} placeholder="12 or N/A"/>
          </div>
          <button type="submit" className="btn primary" style={{flexShrink:0}}>save</button>
        </form>
      )}
      {parts.length===0&&!legacy&&!showAdd&&<div className="empty" style={{paddingTop:4}}>No parts added yet — engineering will confirm part numbers.</div>}
      {legacy&&<div className="mono-sm" style={{marginBottom:6,color:'var(--ink-3)'}}>{inq.part}{inq.qty&&inq.qty!=='N/A'?` · qty ${inq.qty}`:''}</div>}
      {parts.length>0&&(
        <table className="tbl">
          <thead><tr><th>part #</th><th>qty</th>{!inq.archived&&<th style={{width:40}}></th>}</tr></thead>
          <tbody>
            {parts.map((p,i)=>(
              <tr key={i}>
                <td className="mono">{p.partNum||'—'}</td>
                <td className="mono">{p.qty||'N/A'}</td>
                {!inq.archived&&<td><button className="btn sm" style={{color:'#b9562f',borderColor:'#b9562f',padding:'2px 6px'}} onClick={()=>removePart(i)}>✕</button></td>}
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function renderMentions(text){
  return(text||'').split(/(@\w+)/g).map((p,i)=>{
    if(/^@\w+$/.test(p)){const nm=p.slice(1).toLowerCase();const t=window.TEAM.find(m=>m.name.toLowerCase()===nm||m.id===nm);if(t)return<span key={i} className="mtn">{p}</span>;}
    return<React.Fragment key={i}>{p}</React.Fragment>;
  });
}
function MentionTextarea({value,onChange,onSubmit,placeholder,minHeight=60}){
  const [mSearch,setMSearch]=useStateA(null);
  const [selIdx,setSelIdx]=useStateA(0);
  const ref=useRefA(null);
  const filtered=mSearch!=null?window.TEAM.filter(t=>t.name.toLowerCase().startsWith(mSearch.toLowerCase())||t.id.startsWith(mSearch.toLowerCase())):[];
  function handleChange(e){
    const v=e.target.value;onChange(v);
    const pos=e.target.selectionStart;const before=v.slice(0,pos);
    const m=before.match(/@(\w*)$/);
    if(m){setMSearch(m[1]);setSelIdx(0);}else{setMSearch(null);}
  }
  function insertMention(t){
    if(!ref.current)return;
    const pos=ref.current.selectionStart;const before=value.slice(0,pos);const after=value.slice(pos);
    const m=before.match(/@(\w*)$/);if(!m)return;
    const nb=before.slice(0,before.length-m[0].length)+`@${t.name} `;
    onChange(nb+after);setMSearch(null);
    setTimeout(()=>{if(ref.current){ref.current.focus();ref.current.setSelectionRange(nb.length,nb.length);}},0);
  }
  function handleKeyDown(e){
    if(mSearch!=null&&filtered.length>0){
      if(e.key==='ArrowDown'){e.preventDefault();setSelIdx(i=>(i+1)%filtered.length);return;}
      if(e.key==='ArrowUp'){e.preventDefault();setSelIdx(i=>(i-1+filtered.length)%filtered.length);return;}
      if(e.key==='Tab'||(e.key==='Enter'&&!e.metaKey&&!e.ctrlKey)){e.preventDefault();insertMention(filtered[selIdx]||filtered[0]);return;}
      if(e.key==='Escape'){setMSearch(null);return;}
    }
    if(onSubmit&&e.key==='Enter'&&(e.metaKey||e.ctrlKey)){onSubmit();}
  }
  return(
    <div className="mention-wrap">
      {mSearch!=null&&filtered.length>0&&(
        <div className="mention-list">
          {filtered.map((t,i)=>(
            <div key={t.id} className={cls2('mention-item',i===selIdx&&'sel')} onMouseDown={ev=>{ev.preventDefault();insertMention(t);}}>
              <Av2 personId={t.id} size="sm"/>
              <span className="mn">{t.name}</span><span className="mr">{t.role}</span>
            </div>
          ))}
        </div>
      )}
      <textarea ref={ref} placeholder={placeholder} value={value}
        style={{minHeight,resize:'vertical',width:'100%',fontFamily:'var(--hand)',fontSize:13,border:'1.5px solid var(--line)',borderRadius:'4px 8px 4px 10px',padding:'8px 10px',background:'var(--paper)'}}
        onChange={handleChange} onKeyDown={handleKeyDown}/>
    </div>
  );
}
function ChatPanel({messages,currentUser,onSend,onClose}){
  const [draft,setDraft]=useStateA('');
  const bottomRef=useRefA(null);
  useEffectA(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages.length]);
  function send(){if(!draft.trim())return;onSend(draft.trim());setDraft('');}
  return(
    <div className="chat-panel">

          <div key={m.id||i} className="chat-msg">
            <Av2 personId={m.by} size="sm"/>
            <div className="cmb">
              <div><span className="who">{p?.name||m.by}</span><span className="when">{(m.at||'').slice(0,16).replace('T',' ')}</span></div>
              <div className="txt">{renderMentions(m.text)}</div>
            </div>
          </div>
        );})}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-cmp">
        <MentionTextarea value={draft} onChange={setDraft} onSubmit={send} placeholder="message the team… @ to mention" minHeight={36}/>
        <button className="btn primary sm" onClick={send} style={{flexShrink:0}}>→</button>
      </div>
    </div>
  );
}
function AlertsDropdown({alerts,onClose,onMarkAllRead,onClickAlert}){
  const unread=alerts.filter(a=>!a.read).length;

    <div className="alerts-drop">
      <div className="adh">

        {alerts.map(a=>{const from=pers2(a.fromUser);return(
          <div key={a.id} className={cls2('alert-item',!a.read&&'unread')} onClick={()=>onClickAlert(a)}>
            <div><span className="ai-who">{from?.name||a.fromUser}</span><span className="ai-ctx">in {a.inquiryRef||'Team Chat'}</span></div>
            <div className="ai-text">{a.text}</div>
          </div>
        );})}
      </div>

}

  <script type="text/babel">
const { useState, useEffect, useRef } = React;
const { TopBar, NavTabs } = window.Wire;
const { DashboardLanes, DashboardList, DashboardKanban } = window.Dashboards;
const { AccountsList, AccountDetail, InquiryDetail, AllInquiries, KeyProjects, ChatPanel, AlertsDropdown } = window.Views;

const LS_KEY='bushingTracker.route.v1', USER_KEY='bushingTracker.user.v1';
const DOC_REF=window.db.collection('tracker').doc('main');
const PRES_COL=()=>window.db.collection('presence');
const CHAT_COL=()=>window.db.collection('chat');
const ALERTS_COL=()=>window.db.collection('alerts');

function loadRoute(){try{return JSON.parse(localStorage.getItem(LS_KEY))||null}catch{return null}}
function saveRoute(r){localStorage.setItem(LS_KEY,JSON.stringify(r))}
function loadUser(){try{return JSON.parse(localStorage.getItem(USER_KEY))||null}catch{return null}}

function App(){
  const [currentUser,setCurrentUser]=useState(loadUser);
  const [accounts,setAccounts]=useState(window.ACCOUNTS);
  const [loading,setLoading]=useState(true);
  const [onlineUsers,setOnlineUsers]=useState({});
  const [revision,setRevision]=useState(0);
  const skipNextSnap=useRef(false);
  const init=loadRoute()||{view:window.TWEAK_DEFAULTS.startView,accountId:null,inquiry:null};
  const [route,setRoute]=useState(init);
  const [tweaks,setTweaks]=useState({...window.TWEAK_DEFAULTS});
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const [chatMessages,setChatMessages]=useState([]);
  const [alerts,setAlerts]=useState([]);
  const [chatOpen,setChatOpen]=useState(false);
  const [alertsOpen,setAlertsOpen]=useState(false);
  const [chatLastSeen,setChatLastSeen]=useState(()=>localStorage.getItem('bushingTracker.chatLastSeen')||'');

  useEffect(()=>{
    const unsub=DOC_REF.onSnapshot(snap=>{
      if(snap.metadata.hasPendingWrites)return;
      if(skipNextSnap.current){skipNextSnap.current=false;return}
      if(!snap.exists){DOC_REF.set({accounts:window.ACCOUNTS_SEED});setLoading(false);return}
      const d=snap.data();window.ACCOUNTS=d.accounts;setAccounts(d.accounts);setRevision(r=>r+1);setLoading(false);
    },err=>{console.error(err);setLoading(false)});
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!currentUser)return;
    const ref=PRES_COL().doc(currentUser.id);
    const write=()=>ref.set({userId:currentUser.id,lastSeen:new Date().toISOString(),view:route.view});
    write();const iv=setInterval(write,90000);
    const unsubs=window.TEAM.map(t=>PRES_COL().doc(t.id).onSnapshot(snap=>{
      if(!snap.exists){setOnlineUsers(p=>({...p,[t.id]:false}));return;}
      const d=snap.data();
      setOnlineUsers(p=>({...p,[t.id]:d.lastSeen&&(Date.now()-new Date(d.lastSeen).getTime())<3*60*1000}));
    }));
    return()=>{unsubs.forEach(u=>u());clearInterval(iv)};
  },[currentUser,route.view]);

  useEffect(()=>{saveRoute(route)},[route]);
  useEffect(()=>{document.body.classList.toggle('dense',tweaks.density==='dense');document.body.classList.toggle('hide-presence',!tweaks.showPresence)},[tweaks]);

  useEffect(()=>{
    if(!currentUser)return;
    const unsub=CHAT_COL().orderBy('at').limitToLast(60).onSnapshot(snap=>{
      const msgs=[];snap.forEach(d=>msgs.push({id:d.id,...d.data()}));setChatMessages(msgs);
    },err=>console.error('chat listener:',err));
    return()=>unsub();
  },[currentUser?.id]);

  useEffect(()=>{
    if(!currentUser)return;
    const unsub=ALERTS_COL().where('toUser','==',currentUser.id).onSnapshot(snap=>{
      const als=[];snap.forEach(d=>als.push({id:d.id,...d.data()}));
      als.sort((a,b)=>b.at>a.at?1:-1);setAlerts(als.slice(0,30));
    },err=>console.error('alerts listener:',err));
    return()=>unsub();
  },[currentUser?.id]);

  function login(user){window.CURRENT_USER=user;setCurrentUser(user);localStorage.setItem(USER_KEY,JSON.stringify(user))}
  function logout(){if(currentUser)PRES_COL().doc(currentUser.id).delete();window.CURRENT_USER=null;setCurrentUser(null);setOnlineUsers({});localStorage.removeItem(USER_KEY)}

  function mutate(fn){
    setAccounts(prev=>{const next=fn(prev);window.ACCOUNTS=next;skipNextSnap.current=true;DOC_REF.set({accounts:next});return next});
    setRevision(r=>r+1);
  }

  // ── chat / mention helpers ────────────────────────────────────────────────────
  function extractMentionedIds(text){
    const matches=text.match(/@(\w+)/g)||[];
    return[...new Set(matches.map(m=>m.slice(1).toLowerCase()).map(nm=>window.TEAM.find(t=>t.name.toLowerCase()===nm||t.id===nm)).filter(Boolean).map(t=>t.id))];
  }
  function createMentionAlerts(text,fromUserId,context){
    const ids=extractMentionedIds(text).filter(id=>id!==fromUserId);
    if(!ids.length)return;
    const at=new Date().toISOString();
    ids.forEach(toUser=>ALERTS_COL().add({toUser,fromUser:fromUserId,text,inquiryId:context.inquiryId||null,inquiryRef:context.inquiryRef||null,at,read:false}));
  }
  function sendChatMessage(text){
    if(!text.trim()||!currentUser)return;
    const at=new Date().toISOString();
    CHAT_COL().add({by:currentUser.id,at,text:text.trim()});
    createMentionAlerts(text.trim(),currentUser.id,{inquiryId:null,inquiryRef:'Team Chat'});
    setChatLastSeen(at);localStorage.setItem('bushingTracker.chatLastSeen',at);
  }
  function markAlertRead(alertId){ALERTS_COL().doc(alertId).update({read:true});setAlerts(prev=>prev.map(a=>a.id===alertId?{...a,read:true}:a));}
  function markAllAlertsRead(){alerts.filter(a=>!a.read).forEach(a=>ALERTS_COL().doc(a.id).update({read:true}));setAlerts(prev=>prev.map(a=>({...a,read:true})));}

  // ── mutations ────────────────────────────────────────────────────────────────
  function deleteInquiry(id){
    mutate(a=>a.map(ac=>({...ac,projects:ac.projects.map(p=>({...p,inquiries:p.inquiries.filter(i=>i.id!==id)}))})));
    if(route.view==='inquiry'&&route.inquiry?.id===id)setRoute({view:'account',accountId:route.inquiry.accountId,inquiry:null});
  }
  function archiveInquiry(id){
    mutate(a=>a.map(ac=>({...ac,projects:ac.projects.map(p=>({...p,inquiries:p.inquiries.map(i=>i.id===id?{...i,archived:true,archivedAt:new Date().toISOString().slice(0,10)}:i)}))})));
    if(route.view==='inquiry'&&route.inquiry?.id===id)setRoute({view:'account',accountId:route.inquiry.accountId,inquiry:null});
  }
  function deleteProject(id){mutate(a=>a.map(ac=>({...ac,projects:ac.projects.filter(p=>p.id!==id)})))}
  function archiveProject(id){mutate(a=>a.map(ac=>({...ac,projects:ac.projects.map(p=>p.id===id?{...p,archived:true,inquiries:p.inquiries.map(i=>({...i,archived:true}))}:p)})))}
  function postActivity(inquiryId,item){
    mutate(a=>a.map(ac=>({...ac,projects:ac.projects.map(p=>({...p,inquiries:p.inquiries.map(i=>i.id===inquiryId?{...i,activity:[item,...(i.activity||[])],updated:item.at,updatedBy:item.by}:i)}))})));
    createMentionAlerts(item.text,item.by,{inquiryId,inquiryRef:'#'+inquiryId});
  }
  function updateInquiry(id,fields){
    const today=new Date().toISOString().slice(0,10);
    mutate(a=>a.map(ac=>({...ac,projects:ac.projects.map(p=>({...p,inquiries:p.inquiries.map(i=>i.id===id?{...i,...fields,updated:today,updatedBy:currentUser?.id||'fahim'}:i)}))})));
  }
  function promoteAccount(accountId){mutate(a=>a.map(ac=>ac.id===accountId?{...ac,type:'active'}:ac))}
  function deleteAccount(accountId){
    mutate(a=>a.filter(ac=>ac.id!==accountId));
    setRoute({view:'accounts',accountId:null,inquiry:null});
  }
  function changeTier(accountId,tier){mutate(a=>a.map(ac=>ac.id===accountId?{...ac,tier}:ac))}

  function addAccount(formData){
    const id=formData.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const safeId=window.ACCOUNTS.find(a=>a.id===id)?id+'-'+Date.now().toString(36):id;
    const newAcc={id:safeId,name:formData.name.trim(),tier:formData.tier,type:formData.type,location:formData.location.trim(),notes:formData.notes.trim(),projects:[]};
    mutate(a=>[...a,newAcc]);
  }

  function addProject(accountId,projName){
    const id=`${accountId}-${Date.now().toString(36)}`;
    const newProj={id,name:projName,opened:new Date().toISOString().slice(0,10),inquiries:[]};
    mutate(a=>a.map(ac=>ac.id===accountId?{...ac,projects:[...ac.projects,newProj]}:ac));
  }

  function addInquiry(accountId,projectId,formData){
    const acc=window.ACCOUNTS.find(a=>a.id===accountId);
    const existingIds=acc?acc.projects.flatMap(p=>p.inquiries.map(i=>i.id)):[];
    let prefix;
    if(existingIds.length>0){prefix=existingIds[0].split('-')[0]}
    else{prefix=acc.name.replace(/([a-z])([A-Z])/g,'$1 $2').trim().split(/\s+/).map(w=>w[0]?.toUpperCase()||'').join('').slice(0,3)||'INQ'}
    const nums=existingIds.filter(id=>id.startsWith(prefix+'-')).map(id=>parseInt(id.split('-').slice(1).join(''))).filter(n=>!isNaN(n));
    const nextNum=nums.length>0?Math.max(...nums)+1:1001;
    const today=new Date().toISOString().slice(0,10);
    const base={id:`${prefix}-${nextNum}`,updated:today,updatedBy:currentUser?.id||'fahim',
      activity:[{by:currentUser?.id||'fahim',at:today,text:'New inquiry created.'}]};
    let newInq;
    if(formData.type==='info'){
      newInq={...base,type:'info',subject:formData.subject||'',status:formData.status||'open',
        assignedTo:formData.assignedTo||'fahim',priority:formData.priority||'med',due:formData.due||''};
    } else if(formData.type==='project'){
      newInq={...base,type:'project',projectTitle:formData.projectTitle||'',projectStage:formData.projectStage||'discovery',
        potentialVolume:formData.potentialVolume||'',potentialRevenue:formData.potentialRevenue||'',
        priority:formData.priority||'med',notes:formData.notes||'',meetings:[]};
    } else {
      const parts=formData.parts||[];
      const firstNumQty=parseInt((parts[0]?.qty||'').replace(/[^0-9]/g,''))||0;
      newInq={...base,type:'rfq',rfqName:formData.rfqName||'',parts,
        qty:firstNumQty||null,
        stage:'new',priority:formData.priority||'med',
        due:formData.due||new Date(Date.now()+30*86400000).toISOString().slice(0,10),
        specs:formData.specs||'',cost:'',price:'',leadtime:''};
    }
    if(projectId){
      mutate(a=>a.map(ac=>ac.id===accountId?{...ac,projects:ac.projects.map(p=>p.id===projectId?{...p,inquiries:[...p.inquiries,newInq]}:p)}:ac));
    } else {
      const firstActive=acc?.projects.find(p=>!p.archived);
      if(firstActive){
        mutate(a=>a.map(ac=>ac.id===accountId?{...ac,projects:ac.projects.map(p=>p.id===firstActive.id?{...p,inquiries:[...p.inquiries,newInq]}:p)}:ac));
      } else {
        const genProj={id:`${accountId}-${Date.now().toString(36)}`,name:'General Inquiries',opened:today,inquiries:[newInq]};
        mutate(a=>a.map(ac=>ac.id===accountId?{...ac,projects:[...ac.projects,genProj]}:ac));
      }
    }
  }

  // ── nav ───────────────────────────────────────────────────────────────────────
  function updateTweak(k,v){setTweaks(t=>({...t,[k]:v}))}
  function goDashboard(){setRoute({view:'dashboard',accountId:null,inquiry:null})}
  function goAccounts(){setRoute({view:'accounts',accountId:null,inquiry:null})}
  function goAll(){setRoute({view:'all',accountId:null,inquiry:null})}
  function goKeyProjects(){setRoute({view:'keyprojects',accountId:null,inquiry:null})}
  function openAccount(id){setRoute({view:'account',accountId:id,inquiry:null})}
  function openInquiry(inq){
    let full=inq;
    if(!inq.accountName){outer:for(const a of window.ACCOUNTS)for(const p of a.projects)for(const i of p.inquiries)if(i.id===inq.id){full={...i,accountId:a.id,accountName:a.name,projectId:p.id,projectName:p.name};break outer}}
    setRoute({view:'inquiry',accountId:full.accountId,inquiry:full});
  }
  function resolveInquiry(ri){
    if(!ri)return null;
    for(const a of accounts)for(const p of a.projects)for(const i of p.inquiries)if(i.id===ri.id)return{...i,accountId:a.id,accountName:a.name,projectId:p.id,projectName:p.name};
    return ri;
  }

  const crumbs=[];
  if(route.view==='dashboard'){crumbs.push({label:'Dashboard'})}
  else if(route.view==='accounts'){crumbs.push({label:'Dashboard',onClick:goDashboard},{label:'Accounts'})}
  else if(route.view==='all'){crumbs.push({label:'Dashboard',onClick:goDashboard},{label:'All Inquiries'})}
  else if(route.view==='keyprojects'){crumbs.push({label:'Dashboard',onClick:goDashboard},{label:'Key Projects'})}
  else if(route.view==='account'){const acc=accounts.find(a=>a.id===route.accountId);crumbs.push({label:'Dashboard',onClick:goDashboard},{label:'Accounts',onClick:goAccounts},{label:acc?.name||'—'})}
  else if(route.view==='inquiry'){
    const acc=accounts.find(a=>a.id===route.inquiry?.accountId);
    const isKp=route.inquiry?.type==='project';
    crumbs.push({label:'Dashboard',onClick:goDashboard});
    if(isKp)crumbs.push({label:'Key Projects',onClick:goKeyProjects});
    else crumbs.push({label:'Accounts',onClick:goAccounts},{label:acc?.name||'—',onClick:()=>openAccount(acc?.id)});
    crumbs.push({label:'#'+route.inquiry?.id});
  }

  const navCurrent=route.view==='dashboard'?'dashboard'
    :(route.view==='accounts'||route.view==='account')?'accounts'
    :route.view==='keyprojects'?'keyprojects'
    :'all';
  function onNav(id){if(id==='dashboard')goDashboard();else if(id==='accounts')goAccounts();else if(id==='keyprojects')goKeyProjects();else goAll()}

  const mutations={onDeleteInquiry:deleteInquiry,onArchiveInquiry:archiveInquiry,onDeleteProject:deleteProject,onArchiveProject:archiveProject,onPostActivity:postActivity,onAddProject:addProject,onAddInquiry:addInquiry,onPromoteAccount:promoteAccount,onDeleteAccount:deleteAccount,onChangeTier:changeTier,onUpdateInquiry:updateInquiry};

  if(!currentUser)return<LoginScreen onLogin={login}/>;
  if(loading)return<div className="loader">connecting to firebase…</div>;
  const liveInquiry=resolveInquiry(route.inquiry);

  const alertCount=alerts.filter(a=>!a.read).length;
  const chatUnread=chatMessages.filter(m=>m.by!==currentUser.id&&m.at>(chatLastSeen||'')).length;

  function handleAlertClick(a){
    markAlertRead(a.id);
    if(a.inquiryId){
      let found=null;
      outer:for(const ac of accounts)for(const p of ac.projects)for(const i of p.inquiries)if(i.id===a.inquiryId){found={...i,accountId:ac.id,accountName:ac.name,projectId:p.id,projectName:p.name};break outer;}
      if(found)setRoute({view:'inquiry',accountId:found.accountId,inquiry:found});
    }
    setAlertsOpen(false);
  }

  return(<div>
    <TopBar crumbs={crumbs} currentUser={currentUser} onlineUsers={onlineUsers} onLogout={logout}
      alertCount={alertCount} chatUnread={chatUnread}
      onAlertsToggle={()=>{setAlertsOpen(o=>!o);setChatOpen(false);}}
      onChatToggle={()=>{const opening=!chatOpen;setChatOpen(opening);setAlertsOpen(false);if(opening){const now=new Date().toISOString();setChatLastSeen(now);localStorage.setItem('bushingTracker.chatLastSeen',now);}}}
    />
    <NavTabs current={navCurrent} onChange={onNav}/>
    <div className="content" style={chatOpen?{paddingRight:336}:{}}>
      {route.view==='dashboard'&&(<React.Fragment key={`dash-${revision}`}>{tweaks.dashboardVariant==='lanes'?<DashboardLanes onOpenInquiry={openInquiry}/>:tweaks.dashboardVariant==='list'?<DashboardList onOpenInquiry={openInquiry}/>:<DashboardKanban onOpenInquiry={openInquiry}/>}</React.Fragment>)}
      {route.view==='accounts'&&<AccountsList onOpenAccount={openAccount} onAddAccount={addAccount}/>}
      {route.view==='all'&&<AllInquiries key={`all-${revision}`} onOpenInquiry={openInquiry}/>}
      {route.view==='keyprojects'&&<KeyProjects key={`kp-${revision}`} onOpenInquiry={openInquiry} onAddInquiry={addInquiry}/>}
      {route.view==='account'&&<AccountDetail accountId={route.accountId} onOpenInquiry={openInquiry} {...mutations}/>}
      {route.view==='inquiry'&&liveInquiry&&<InquiryDetail key={liveInquiry.id} inquiry={liveInquiry} onOpenAccount={openAccount} {...mutations}/>}
    </div>
    {alertsOpen&&<div style={{position:'fixed',inset:0,zIndex:599}} onClick={()=>setAlertsOpen(false)}/>}
    {alertsOpen&&<AlertsDropdown alerts={alerts} onClose={()=>setAlertsOpen(false)} onMarkAllRead={markAllAlertsRead} onClickAlert={handleAlertClick}/>}
    {chatOpen&&<ChatPanel messages={chatMessages} currentUser={currentUser} onSend={sendChatMessage} onClose={()=>setChatOpen(false)}/>}
    <div style={{position:'fixed',bottom:16,right:chatOpen?336:16,zIndex:200,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,transition:'right .15s'}}>
      <button className="btn sm" onClick={()=>setTweaksOpen(o=>!o)}>{tweaksOpen?'✕ close':'⚙ tweaks'}</button>
      {tweaksOpen&&(<div style={{background:'var(--paper)',border:'2px solid var(--line)',borderRadius:'6px 14px 6px 14px',padding:'14px 16px',boxShadow:'4px 4px 0 #8a7f72',width:260}}>
        <h4 style={{fontFamily:'var(--title)',fontSize:15,fontWeight:700,margin:'0 0 8px',letterSpacing:'-0.01em',color:'var(--ink)'}}>Tweaks</h4>
        <div className="mono-sm" style={{marginBottom:4,marginTop:8}}>DASHBOARD LAYOUT</div>
        <div className="seg">{['lanes','list','kanban'].map(v=>(<button key={v} className={tweaks.dashboardVariant===v?'active':''} onClick={()=>updateTweak('dashboardVariant',v)}>{v==='lanes'?'by person':v==='list'?'priority list':'by stage'}</button>))}</div>
        <div className="mono-sm" style={{marginBottom:4,marginTop:10}}>DENSITY</div>
        <div className="seg">{['comfortable','dense'].map(v=>(<button key={v} className={tweaks.density===v?'active':''} onClick={()=>updateTweak('density',v)}>{v}</button>))}</div>
        <div className="mono-sm" style={{marginBottom:4,marginTop:10}}>PRESENCE</div>
        <div className="seg"><button className={tweaks.showPresence?'active':''} onClick={()=>updateTweak('showPresence',true)}>shown</button><button className={!tweaks.showPresence?'active':''} onClick={()=>updateTweak('showPresence',false)}>hidden</button></div>
        <div className="mono-sm" style={{marginTop:14,paddingTop:10,borderTop:'1px dashed #8a7f72'}}>live · firebase · crosslink</div>
      </div>)}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
